services:
  postgres:
    image: postgres:16-alpine
    container_name: scrible-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scrible
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - scrible_pg_data:/var/lib/postgresql/data

volumes:
  scrible_pg_data: